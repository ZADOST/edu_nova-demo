publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^13.2.0          # (Keep your existing Edu Nova routing)
  shared_preferences: ^2.2.2  # (Keep your existing Edu Nova storage)
  
  # --- ADDED FROM ABDUATTENDANCEMANAGER ---
  sqflite: ^2.4.2
